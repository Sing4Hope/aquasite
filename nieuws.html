<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aqua Roleplay - Nieuws</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#070b14;
    color:#d1d5db;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 28px;
    background:#0b1220;
    border-bottom:1px solid #1f2937;
}

.logo{
    font-weight:600;
    color:#e5e7eb;
}

nav ul{
    display:flex;
    gap:18px;
    list-style:none;
    margin:0;
    padding:0;
}

nav ul li a{
    color:#9ca3af;
    text-decoration:none;
    font-size:12px;
    text-transform:uppercase;
}

nav ul li a:hover{
    color:#3b82f6;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
    border-bottom:1px solid #1f2937;
}

.hero h1{
    margin:0;
    font-size:28px;
    color:#f3f4f6;
}

.hero p{
    font-size:13px;
    color:#9ca3af;
    margin-top:10px;
}

/* NEWS GRID */
.news-container{
    max-width:900px;
    margin:40px auto;
    padding:0 20px;

    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:14px;
}

/* CARD */
.news-card{
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:8px;
    padding:16px;
    transition:0.2s;
    animation: fadeUp 0.6s ease;
}

.news-card:hover{
    transform:translateY(-5px);
    border-color:#3b82f6;
}

/* TITLE */
.news-title{
    font-size:14px;
    margin:0 0 6px 0;
    color:#e5e7eb;
}

/* DATE */
.news-date{
    font-size:11px;
    color:#3b82f6;
    margin-bottom:10px;
}

/* TEXT */
.news-text{
    font-size:12px;
    color:#9ca3af;
    line-height:1.5;
}

/* ANIMATION */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(12px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    font-size:12px;
    color:#6b7280;
    border-top:1px solid #1f2937;
    margin-top:40px;
}
</style>

</head>

<body>

<nav>
    <div class="logo">AQUA ROLEPLAY</div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="sollicitatie.html">Solliciteren</a></li>
        <li><a href="nieuws.html">Nieuws</a></li>
        <li><a href="regels.html">Regels</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<header class="hero">
    <h1>NIEUWS</h1>
    <p>Blijf op de hoogte van updates, veranderingen en events.</p>
</header>

<div class="news-container" id="newsContainer"></div>

<footer>
    © 2026 Aqua Roleplay • Alle rechten voorbehouden
</footer>

<script>

// 🔥 HIER PAS JE NIEUWS AAN
const newsData = [
    {
        title: "Staffwipe",
        date: "07-06-2026",
        text: "Staffwipe gedaan."
    },
    {
        title: "Website online",
        date: "05-06-2026",
        text: "Sollicitaties zijn nu geopend. Je kunt je aanmelden via de website."
    },
    {
        title: "Discord update",
        date: "03-06-2026",
        text: "Onze Discord is vernieuwd met nieuwe kanalen en rollen."
    }

    // ➕ Voeg hier simpel meer nieuws toe
];

const container = document.getElementById("newsContainer");

newsData.forEach(item => {

    const card = document.createElement("div");
    card.className = "news-card";

    card.innerHTML = `
        <div class="news-title">${item.title}</div>
        <div class="news-date">${item.date}</div>
        <div class="news-text">${item.text}</div>
    `;

    container.appendChild(card);
});

</script>

</body>
</html>
