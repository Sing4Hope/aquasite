<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollicitatie - Aqua Roleplay</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#070b14;
    color:#d1d5db;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 28px;
    background:#0b1220;
    border-bottom:1px solid #1f2937;
}

.logo{
    font-weight:600;
    color:#e5e7eb;
    letter-spacing:1px;
}

nav ul{
    display:flex;
    gap:16px;
    list-style:none;
    margin:0;
    padding:0;
}

nav ul li a{
    color:#9ca3af;
    text-decoration:none;
    font-size:12px;
    text-transform:uppercase;
}

nav ul li a:hover{
    color:#3b82f6;
}

/* CONTAINER */
.container{
    max-width:760px;
    margin:70px auto;
    padding:26px;
    background:linear-gradient(180deg,#0b1220,#070b14);
    border:1px solid #1f2937;
    border-left:4px solid #3b82f6;
    border-radius:10px;
}

/* TITLE */
h1{
    text-align:center;
    font-size:20px;
    margin:0;
    color:#f3f4f6;
    letter-spacing:1px;
}

.subtitle{
    text-align:center;
    font-size:12px;
    color:#9ca3af;
    margin-top:6px;
    margin-bottom:16px;
}

.status{
    text-align:center;
    font-size:12px;
    color:#f87171;
    margin-bottom:18px;
}

/* FORM GRID */
form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

/* FIELD WRAPPER */
.field{
    display:flex;
    flex-direction:column;
}

/* FULL WIDTH */
.full{
    grid-column:1 / -1;
}

/* LABEL */
label{
    font-size:11px;
    color:#9ca3af;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:6px;
}

/* INPUTS */
input, select, textarea{
    width:100%;
    padding:10px 12px;
    border-radius:6px;
    border:1px solid #1f2937;
    background:#050914;
    color:#e5e7eb;
    font-size:13px;
    outline:none;
    box-sizing:border-box;
    transition:0.2s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#3b82f6;
    box-shadow:0 0 0 2px rgba(59,130,246,0.12);
}

/* TEXTAREA */
textarea{
    min-height:95px;
    resize:none;
}

/* BUTTON */
button{
    grid-column:1 / -1;
    padding:12px;
    border-radius:6px;
    border:1px solid #2b3445;
    background:#1f2937;
    color:#e5e7eb;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
    letter-spacing:1px;
}

button:hover{
    background:#3b82f6;
    border-color:#3b82f6;
    transform:translateY(-2px);
}

button:active{
    transform:scale(0.98);
}

/* MOBILE FIX */
@media (max-width:700px){
    form{
        grid-template-columns:1fr;
    }
}
</style>

</head>

<body>

<nav>
    <div class="logo">AQUA ROLEPLAY</div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="sollicitatie.html">Solliciteren</a></li>
        <li><a href="nieuws.html">Nieuws</a></li>
        <li><a href="regels.html">Regels</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<div class="container">

<h1>SOLLICITATIE FORMULIER</h1>
<div class="subtitle">Whitelist aanvraag • beoordeling door staff team</div>
<div class="status">SERVER MOMENTEEL GESLOTEN</div>

<form id="sollicitatieForm">

    <div class="field">
        <label>Discord naam</label>
        <input type="text" id="naam" required placeholder="username#0000">
    </div>

    <div class="field">
        <label>Leeftijd</label>
        <input type="number" id="leeftijd" required placeholder="14+">
    </div>

    <div class="field full">
        <label>Functie</label>
        <select id="functie">
            <option>Politie</option>
            <option>Ambulance</option>
            <option>Brandweer</option>
            <option>Staff</option>
            <option>Developer</option>
        </select>
    </div>

    <div class="field full">
        <label>Ervaring in roleplay</label>
        <textarea id="ervaring"></textarea>
    </div>

    <div class="field">
        <label>3 sterke punten</label>
        <textarea id="pluspunten"></textarea>
    </div>

    <div class="field">
        <label>3 zwakke punten</label>
        <textarea id="minpunten"></textarea>
    </div>

    <div class="field full">
        <label>Motivatie</label>
        <textarea id="motivatie"></textarea>
    </div>

    <button type="submit">SOLLICITATIE VERSTUREN</button>

</form>

</div>

<script src="js/sollicitatie.js"></script>

</body>
</html>
