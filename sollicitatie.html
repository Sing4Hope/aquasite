<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollicitatie - Aqua Roleplay</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    margin:0;
    background:#0a0f1a;
    font-family: Arial, Helvetica, sans-serif;
    color:#d1d5db;
}

/* RP PANEL LOOK */
.container{
    max-width:720px;
    margin:90px auto;
    background:linear-gradient(180deg,#0f172a,#0b1220);
    border:1px solid #1f2937;
    border-left:4px solid #3b82f6; /* FiveM accent bar */
    padding:26px;
    border-radius:10px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.6);
}

/* TITLE = ADMIN PANEL STYLE */
h1{
    text-align:center;
    font-size:20px;
    font-weight:600;
    color:#e5e7eb;
    margin-bottom:18px;
    letter-spacing:0.5px;
}

h1::after{
    content:"";
    display:block;
    width:60px;
    height:2px;
    background:#3b82f6;
    margin:10px auto 0;
}

/* LABELS = DISCORD/FIVEM UI */
label{
    display:block;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:#94a3b8;
    margin-bottom:6px;
}

/* INPUT STYLE = PANEL FIELDS */
input, select, textarea{
    width:100%;
    padding:10px 12px;
    margin-bottom:14px;
    border-radius:6px;
    border:1px solid #1f2937;
    background:#0b1220;
    color:#e5e7eb;
    font-size:14px;
    outline:none;
    transition:0.2s;
}

/* FOCUS = BLUE RP GLOW */
input:focus,
select:focus,
textarea:focus{
    border-color:#3b82f6;
    box-shadow:0 0 0 2px rgba(59,130,246,0.15);
}

/* TEXTAREA = RP STYLE */
textarea{
    min-height:110px;
    resize:none;
}

/* BUTTON = FIVE M ACTION BUTTON */
button{
    width:100%;
    padding:11px;
    border:none;
    border-radius:6px;
    background:#1f2937;
    color:#e5e7eb;
    font-weight:600;
    letter-spacing:0.5px;
    cursor:pointer;
    transition:0.2s;
    border:1px solid #2b3445;
}

button:hover{
    background:#3b82f6;
    border-color:#3b82f6;
    transform:translateY(-1px);
}

button:active{
    transform:scale(0.98);
}

/* small “panel feel” spacing */
form{
    margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

<h1>STAFF APPLICATION - AQUA ROLEPLAY</h1>

<form id="sollicitatieForm">

    <label>Discord ID</label>
    <input type="text" id="naam" required placeholder="username#0000">

    <label>Leeftijd</label>
    <input type="number" id="leeftijd" required placeholder="min. 14+">

    <label>Functie</label>
    <select id="functie">
        <option>Politie</option>
        <option>Ambulance</option>
        <option>Brandweer</option>
        <option>Staff</option>
        <option>Developer</option>
    </select>

    <label>Roleplay ervaring</label>
    <textarea id="ervaring"></textarea>

    <label>Strengths</label>
    <textarea id="pluspunten"></textarea>

    <label>Weaknesses</label>
    <textarea id="minpunten"></textarea>

    <label>Motivatie</label>
    <textarea id="motivatie"></textarea>

    <button type="submit">SEND APPLICATION</button>

</form>

</div>

<script src="js/sollicitatie.js"></script>

</body>
</html>
