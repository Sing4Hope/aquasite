<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sollicitatie - Aqua Roleplay</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    margin: 0;
    background:#0b1220;
    color:#e5e7eb;
    font-family: Arial, Helvetica, sans-serif;
}

/* container voelt meer als panel i.p.v. AI card */
.container{
    max-width:700px;
    margin:100px auto;
    background:#111827;
    padding:28px;
    border-radius:14px;
    border:1px solid #1f2937;
    box-shadow: 0 10px 35px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    color:#f3f4f6;
    margin-bottom:18px;
    font-size:22px;
    font-weight:600;
}

/* labels iets netter en “real UI” */
label{
    display:block;
    font-size:13px;
    margin-bottom:6px;
    color:#9ca3af;
}

/* inputs minder “glow AI box” */
input, select, textarea{
    width:100%;
    padding:11px 12px;
    margin-bottom:14px;
    border-radius:8px;
    border:1px solid #2b3445;
    background:#0b1220;
    color:#e5e7eb;
    outline:none;
    font-size:14px;
}

/* focus subtiel */
input:focus,
select:focus,
textarea:focus{
    border-color:#3b82f6;
}

/* textarea iets realistischer */
textarea{
    min-height:110px;
    resize:vertical;
}

/* button minder neon, meer panel style */
button{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #2b3445;
    background:#111827;
    color:#e5e7eb;
    font-weight:600;
    cursor:pointer;
    transition:0.2s ease;
}

button:hover{
    background:#1f2937;
    transform: translateY(-1px);
}
</style>

</head>
<body>

<div class="container">

<h1>🌊 Solliciteren bij Aqua RP</h1>

<form id="sollicitatieForm">

    <label>Discord Naam</label>
    <input type="text" id="naam" required placeholder="Bijv. Thijs#1234">

    <label>Leeftijd</label>
    <input type="number" id="leeftijd" required placeholder="Bijv. 15">

    <label>Welke functie wil je?</label>
    <select id="functie">
        <option>Politie</option>
        <option>Ambulance</option>
        <option>Brandweer</option>
        <option>Staff</option>
        <option>Developer</option>
    </select>

    <label>Ervaring in roleplay</label>
    <textarea id="ervaring" required></textarea>

    <label>Noem 3 pluspunten van jezelf</label>
    <textarea id="pluspunten" required></textarea>

    <label>Noem 3 minpunten van jezelf</label>
    <textarea id="minpunten" required></textarea>

    <label>Waarom wil je bij Aqua RP?</label>
    <textarea id="motivatie" required></textarea>

    <button type="submit">Versturen 🚀</button>

</form>

</div>

<script src="js/sollicitatie.js"></script>

</body>
</html>
