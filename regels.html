<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aqua Roleplay - Regels</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#070b14;
    color:#d1d5db;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 28px;
    background:#0b1220;
    border-bottom:1px solid #1f2937;
}

.logo{
    font-weight:600;
    color:#e5e7eb;
}

nav ul{
    display:flex;
    gap:18px;
    list-style:none;
}

nav ul li a{
    color:#9ca3af;
    text-decoration:none;
    font-size:12px;
    text-transform:uppercase;
}

nav ul li a:hover{
    color:#3b82f6;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
    border-bottom:1px solid #1f2937;
}

.hero h1{
    margin:0;
    font-size:28px;
    color:#f3f4f6;
}

.hero p{
    font-size:13px;
    color:#9ca3af;
    max-width:600px;
    margin:10px auto 0 auto;
}

/* RULE ACCORDION */
.rules-container{
    max-width:800px;
    margin:40px auto;
    padding:0 20px;
}

/* item */
.rule-item{
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:8px;
    margin-bottom:10px;
    overflow:hidden;
    transition:0.2s;
}

.rule-item:hover{
    border-color:#3b82f6;
}

/* header */
.rule-header{
    padding:14px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    color:#e5e7eb;
    user-select:none;
}

.arrow{
    transition:0.3s;
    color:#3b82f6;
}

/* content */
.rule-content{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.3s ease, padding 0.3s ease;
    padding:0 14px;
}

.rule-content ul{
    margin:0;
    padding-left:18px;
}

.rule-content li{
    font-size:12px;
    color:#9ca3af;
    margin-bottom:8px;
    line-height:1.5;
}

/* open state */
.rule-item.active .rule-content{
    padding:0 14px 14px 14px;
    max-height:400px;
}

.rule-item.active .arrow{
    transform:rotate(180deg);
}

/* footer */
footer{
    text-align:center;
    padding:20px;
    font-size:12px;
    color:#6b7280;
    border-top:1px solid #1f2937;
    margin-top:40px;
}
</style>

</head>

<body>

<nav>
    <div class="logo">AQUA ROLEPLAY</div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="sollicitatie.html">Solliciteren</a></li>
        <li><a href="nieuws.html">Nieuws</a></li>
        <li><a href="regels.html">Regels</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<header class="hero">
    <h1>SERVER REGELS</h1>
    <p>Klik op een categorie om de regels te bekijken.</p>
</header>

<div class="rules-container" id="rulesContainer"></div>

<footer>
    © 2026 Aqua Roleplay • Alle rechten voorbehouden
</footer>

<script>
// 🔥 HIER PAS JE ALLES AAN (regels toevoegen!)
const rulesData = [
    {
        title: " Discord Regels",
        rules: [
            "Respecteer onze staffleden.",
            "Geen toxic gedrag, racisme of discriminatie.",
            "Geen hacks, exploits of mods.",
            "Geen DM-Reclame",
            "Geen bestuur+ taggen.",
        ]
    },
    {
        title: "Ingame Regels",
        rules: [
            "Respecteer onze staffleden",
            "Fail RP is niet toegestaan.",
            "RDM & VDM zijn verboden.",
            "het verstoren van een roleplay scenario is niet toegestaan."
        ]
    },
    {
        title: "Criminaliteit",
        rules: [
            "Geen KOS zonder geldige reden.",
            "Overvallen moeten realistisch zijn.",
            "Geen criminaliteit in safezones."
        ]
    },
    {
        title: "Staff Regels",
        rules: [
            "Staff heeft altijd het laatste woord.",
            "Geen discussie in-game.",
            "Report via Discord tickets.",
            "Misbruik = permanente ban."
        ]
    }

    // ➕ HIER KUN JE GEWOON NIEUWE SECTIES TOEVOEGEN
];

const container = document.getElementById("rulesContainer");

rulesData.forEach((section) => {

    const item = document.createElement("div");
    item.className = "rule-item";

    item.innerHTML = `
        <div class="rule-header">
            <span>${section.title}</span>
            <span class="arrow">▼</span>
        </div>
        <div class="rule-content">
            <ul>
                ${section.rules.map(r => `<li>${r}</li>`).join("")}
            </ul>
        </div>
    `;

    item.querySelector(".rule-header").addEventListener("click", () => {
        item.classList.toggle("active");
    });

    container.appendChild(item);
});

</script>

</body>
</html>
